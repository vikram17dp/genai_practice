<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

  <div class="w-full max-w-xl bg-white shadow-lg rounded-lg flex flex-col h-[600px]">
    
    <div class="p-4 border-b font-semibold text-lg">
      AI Chatbot
    </div>

    <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3"></div>

    <div class="p-4 border-t flex gap-2">
      <input 
        id="messageInput"
        class="flex-1 border rounded px-3 py-2 focus:outline-none"
        placeholder="Type your message..."
      />
      <button 
        onclick="sendMessage()"
        class="bg-blue-500 text-white px-4 py-2 rounded">
        Send
      </button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
